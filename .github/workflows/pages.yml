name: Deploy Pages (main + dev)

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (site root)
        uses: actions/checkout@v4
        with:
          ref: main
          path: site

      - name: Checkout develop (site /dev/)
        uses: actions/checkout@v4
        with:
          ref: develop
          path: site/dev

      - name: Strip .git from published output
        run: rm -rf site/.git site/dev/.git

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
